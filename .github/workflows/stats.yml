name: stats

# ClearPath test-stats producer (estate test-scope tile).
# Emits the contract-conformant stats.json from vitest's own JSON reporter
# (runner-reported, never grep) and commits it back to main.
# Contract: neckarshore-planning/docs/reference/stats-json-contract.md
#
# Loop guards (both required):
#   - push-to-main only, never on PR (avoids a commit loop via PR builds)
#   - the stats commit carries [skip ci]; the `if` guard is belt-and-braces
#     on top of GitHub's built-in [skip ci] handling.

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  emit-stats:
    name: emit test-stats
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest
    permissions:
      contents: write # commits stats.json back to main
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "24"
          cache: npm
      - run: npm ci
      - run: npx vitest run --reporter=json --outputFile=.vitest-report.json
      - uses: neckarshore-ai/test-stats-action@101f0c27d63ccb1982275adcaf03880bac61cd12 # v1
        with:
          runners: "unit:vitest:.vitest-report.json"
          out: stats.json
          sha: ${{ github.sha }}
      - name: Commit stats.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add stats.json
          git diff --staged --quiet || { git commit -m "chore: update stats.json [skip ci]"; git push; }
