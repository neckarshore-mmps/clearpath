name: ci

# ClearPath v0.2a — unit test gate (S1+).
# Kept separate from security.yml (test concern ≠ scan concern).
# Triggered on the same surfaces as security.yml for consistency.

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: vitest unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "24"
          cache: npm
      - run: npm ci
      - run: npm test
